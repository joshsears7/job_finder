[tool.ruff]
target-version = "py311"
line-length = 100
exclude = ["backups", "__pycache__", ".venv", "chroma_db"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "C4", "PIE", "SIM"]
ignore = [
    "E501",
    "B008",
    "B905",
    "SIM108",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
